<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Fast Online conversion of CSV Files to JSON. RFC 4180 Compliant. Large File Support. Custom field delimiters. Allows mapping of header row index and value formatting. Works in Browser environments with full RFC 4180 compliance."/>
    <title>CSV to JSON Converter</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#e3dfff",
              "surface-dim": "#d2d9f4",
              "tertiary-fixed": "#c9e6ff",
              "on-surface-variant": "#464554",
              "surface": "#faf8ff",
              "surface-container": "#eaedff",
              "outline": "#777586",
              "surface-tint": "#5148d7",
              "secondary-fixed": "#d3e4fe",
              "on-secondary-container": "#54647a",
              "on-primary-container": "#c1beff",
              "on-tertiary-fixed-variant": "#004c6e",
              "on-error-container": "#93000a",
              "background": "#faf8ff",
              "on-secondary-fixed-variant": "#38485d",
              "tertiary-container": "#00577e",
              "primary": "#2a14b4",
              "surface-container-highest": "#dae2fd",
              "on-tertiary-fixed": "#001e2f",
              "on-background": "#131b2e",
              "on-secondary-fixed": "#0b1c30",
              "on-surface": "#131b2e",
              "surface-container-high": "#e2e7ff",
              "primary-container": "#4338ca",
              "primary-fixed-dim": "#c3c0ff",
              "secondary-container": "#d0e1fb",
              "inverse-primary": "#c3c0ff",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#89ceff",
              "secondary": "#505f76",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#84cdff",
              "secondary-fixed-dim": "#b7c8e1",
              "tertiary": "#003f5c",
              "error": "#ba1a1a",
              "on-primary-fixed-variant": "#372abf",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "outline-variant": "#c7c4d7",
              "on-primary-fixed": "#100069",
              "surface-container-low": "#f2f3ff",
              "surface-variant": "#dae2fd",
              "on-secondary": "#ffffff",
              "inverse-surface": "#283044",
              "error-container": "#ffdad6",
              "surface-bright": "#faf8ff",
              "inverse-on-surface": "#eef0ff"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"}
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding-bottom: 160px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .action-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            z-index: 60;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.08);
            padding: 1rem 0.75rem;
        }
        .action-footer-inner {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .action-footer .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            width: 100%;
        }
        @media (min-width: 640px) {
            .action-footer .buttons {
                width: auto;
            }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c7c4d7;
            border-radius: 10px;
        }
        .tab, .output-tab {
            padding: 0.9rem 1.25rem;
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        .tab.active, .output-tab.active {
            background: rgba(67, 56, 202, 0.12);
            color: #4338ca;
        }
        .tab:hover, .output-tab:hover {
            background: rgba(67, 56, 202, 0.08);
        }
        .btn-sample {
            background: rgba(67, 56, 202, 0.08);
            color: #4338ca;
            border: 1px solid rgba(67, 56, 202, 0.16);
            border-radius: 9999px;
            padding: 0.75rem 1rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .btn-sample:hover {
            background: rgba(67, 56, 202, 0.14);
            transform: translateY(-1px);
        }
        .sample-btn {
            background: rgba(67, 56, 202, 0.1);
            color: #4338ca;
            border: 1.5px solid rgba(67, 56, 202, 0.3);
            border-radius: 9999px;
            padding: 0.625rem 1rem;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .sample-btn:hover {
            background: rgba(67, 56, 202, 0.18);
            border-color: rgba(67, 56, 202, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.15);
        }
        .sample-btn:active {
            transform: translateY(-1px);
            background: rgba(67, 56, 202, 0.24);
        }
        .table-output {
            width: 100%;
            display: block;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 500px;
        }
        .table-output table {
            /* Allow table to size to content so headers fit on one line
               while still filling the container when content is small. */
            width: max-content;
            table-layout: auto;
            min-width: 100%;
        }
        .table-output th {
            background: rgba(67, 56, 202, 0.08);
            color: #4338ca;
            font-weight: 600;
            text-align: left;
            padding: 0.875rem 1rem;
            border-bottom: 2px solid rgba(67, 56, 202, 0.2);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table-output td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
            border-right: 1px solid rgba(15, 23, 42, 0.08);
            font-size: 0.8125rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .table-output td:last-child {
            border-right: none;
        }
        .table-output tr:hover {
            background: rgba(67, 56, 202, 0.04);
        }
        .table-output tr:last-child td {
            border-bottom: none;
        }
        .tab-content,
        .output-content {
            display: none;
        }
        .tab-content.active,
        .output-content.active {
            display: block;
        }
        .error-output {
            display: none;
        }
        .error-output:not(.hidden) {
            display: block;
        }
        .footer-basic {
            width: 100%;
            padding: 24px 0;
            color: #6b7280;
        }
        .footer-basic a {
            color: inherit;
            text-decoration: none;
            opacity: 0.8;
        }
        .footer-basic a:hover {
            opacity: 1;
        }
        .footer-basic .social > a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            color: inherit;
            opacity: 0.75;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<nav class="fixed top-0 w-full z-50 h-20 bg-white/90 backdrop-blur-2xl shadow-[0_24px_48px_-12px_rgba(19,27,46,0.08)]">
    <div class="max-w-7xl mx-auto h-full px-6 flex items-center justify-between gap-6">
        <div class="flex items-center gap-8">
            <span class="text-2xl font-bold tracking-tighter text-indigo-900 font-headline">CSV to JSON Converter</span>
        </div>
        <div class="lg:flex items-center gap-6 text-sm text-secondary">
            <a href="https://github.com/iuccio/csvToJson" class="hover:text-indigo-600 transition">GitHub</a>
            <a href="https://github.com/iuccio/csvToJson/blob/master/README.md" class="hover:text-indigo-600 transition">Documentation</a>
            <a href="https://www.npmjs.com/package/convert-csv-to-json" class="hover:text-indigo-600 transition">npm</a>
            <a href="https://github.com/iuccio" class="hover:text-indigo-600 transition">About</a>
        </div>
    </div>
</nav>
<main class="pt-32 pb-16 px-6 md:px-8 max-w-[1600px] mx-auto">
    <div class="grid content-grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <aside class="lg:col-span-3 space-y-6">
            <div class="bg-surface-container-lowest rounded-3xl border border-outline-variant/10 p-6 shadow-sm">
                <div class="mb-6">
                    <p class="text-sm font-bold uppercase tracking-[0.3em] text-secondary">Parsing Options</p>
                </div>
                <div class="space-y-5">
                    <div class="flex items-center justify-between gap-3 rounded-3xl bg-white/80 border border-outline-variant/20 px-4 py-4">
                        <label for="format-values" class="text-sm font-medium text-on-surface-variant">Format values by type</label>
                        <input id="format-values" type="checkbox" checked class="accent-primary" />
                    </div>
                    <div class="flex items-center justify-between gap-3 rounded-3xl bg-white/80 border border-outline-variant/20 px-4 py-4">
                        <label for="quoted-fields" class="text-sm font-medium text-on-surface-variant">Support quoted fields</label>
                        <input id="quoted-fields" type="checkbox" class="accent-primary" />
                    </div>
                    <div class="space-y-2">
                        <label for="delimiter" class="text-xs font-bold uppercase tracking-[0.3em] text-outline">Field Delimiter</label>
                        <input id="delimiter" type="text" value="," class="w-full rounded-3xl border border-outline-variant/20 bg-white/90 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                    <div class="space-y-2">
                        <label for="header-index" class="text-xs font-bold uppercase tracking-[0.3em] text-outline">Header Row Index</label>
                        <input id="header-index" type="number" value="0" min="0" class="w-full rounded-3xl border border-outline-variant/20 bg-white/90 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                    <div class="space-y-2">
                        <label for="ignore-column-indexes" class="text-xs font-bold uppercase tracking-[0.3em] text-outline">Ignore Column Indexes</label>
                        <input id="ignore-column-indexes" type="text" placeholder="e.g. 0,2,4" class="w-full rounded-3xl border border-outline-variant/20 bg-white/90 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                    <div id="file-only-options" style="display: none;" class="space-y-4 rounded-3xl bg-surface-container p-4 border border-outline-variant/10">
                        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-secondary">File Options</p>
                        <div class="flex items-center justify-between gap-3 px-2">
                            <label for="use-streaming" class="text-sm text-on-surface">Use streaming</label>
                            <input id="use-streaming" type="checkbox" class="accent-primary" />
                        </div>
                        <div class="flex items-center justify-between gap-3 px-2">
                            <label for="use-chunked" class="text-sm text-on-surface">Chunked processing</label>
                            <input id="use-chunked" type="checkbox" class="accent-primary" />
                        </div>
                        <div id="chunked-options" style="display: none;" class="space-y-2 rounded-3xl bg-white/90 border border-outline-variant/10 p-3">
                            <label for="chunk-size" class="text-sm text-on-surface">Chunk size</label>
                            <input id="chunk-size" type="number" value="1000" min="100" max="10000" class="w-full rounded-3xl border border-outline-variant/20 bg-white/90 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                            <p class="text-xs text-secondary">Rows per chunk</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <div class="lg:col-span-9 grid grid-cols-1 gap-8">
            <div class="bg-surface-container-lowest rounded-3xl border border-outline-variant/10 shadow-sm overflow-hidden">
                <div class="flex flex-wrap items-center justify-between gap-3 border-b border-outline-variant/10 bg-white/70 px-6 py-5">
                    <div>
                        <p class="text-sm font-semibold text-on-surface">Source CSV</p>
                        <p class="text-sm text-secondary">Paste CSV text or upload a file to convert.</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button class="tab active" data-tab="text">Paste CSV</button>
                        <button class="tab" data-tab="file">Upload File</button>
                    </div>
                </div>
                <div class="p-6 space-y-6">
                    <div id="text-tab" class="tab-content active space-y-5">
                        <textarea id="csv-input" class="w-full min-h-[320px] rounded-[2rem] border border-outline-variant/20 bg-white/90 p-6 text-sm font-mono leading-6 custom-scrollbar focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="Paste your CSV data here...\n\nExample:\nname,age,city\nJohn,25,New York\nJane,30,London"></textarea>
                        <div class="flex flex-wrap gap-3">
                            <button class="sample-btn" data-sample="basic">Basic CSV</button>
                            <button class="sample-btn" data-sample="quoted">Quoted Fields</button>
                            <button class="sample-btn" data-sample="numbers">Numbers</button>
                            <button class="sample-btn" data-sample="dates">Dates</button>
                        </div>
                    </div>
                    <div id="file-tab" class="tab-content">
                        <input id="csv-file" type="file" accept=".csv,text/csv" class="w-full rounded-[2rem] border border-outline-variant/20 bg-white/90 px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                </div>
            </div>
            <div class="bg-surface-container-low rounded-3xl border border-outline-variant/10 shadow-sm p-6 space-y-6">
                <div id="stats-output-container" class="rounded-3xl bg-white/90 p-4 hidden">
                    <div id="stats-output" class="flex flex-wrap gap-3 text-sm text-secondary">
                        <div id="file-info"></div>
                    </div>
                </div>
                <div id="output" class="output hidden space-y-4">
                    <div id="error-output" class="error-output rounded-3xl border border-red-200 bg-red-50 p-4 text-sm text-red-800 hidden"></div>
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div class="flex flex-wrap gap-2">
                            <button class="output-tab active" data-output="table">Table View</button>
                            <button class="output-tab" data-output="json" id="output-tab-json">JSON View</button>
                        </div>
                        <span class="text-xs uppercase tracking-[0.3em] text-secondary">Preview</span>
                    </div>
                    <div id="table-title" class="text-xs text-secondary"></div>
                    <div id="table-content" class="output-content active">
                        <div id="table-output" class="table-output rounded-3xl border border-outline-variant/10 bg-white/90 p-5 overflow-auto custom-scrollbar"></div>
                    </div>
                    <div id="json-content" class="output-content">
                        <div id="json-output" class="json-output rounded-3xl border border-outline-variant/10 bg-white/90 p-5 overflow-auto custom-scrollbar whitespace-pre-wrap break-words"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div class="action-footer">
    <div class="action-footer-inner">
        <div class="buttons">
            <button id="convert-btn" class="rounded-3xl bg-gradient-to-br from-primary to-primary-container text-white px-6 py-3 font-bold shadow-lg hover:shadow-indigo-200 transition">Convert to JSON</button>
            <button id="clear-btn" class="rounded-3xl border border-outline-variant/20 bg-white/90 px-6 py-3 text-on-surface font-semibold hover:bg-surface-container transition">Clear</button>
            <button id="download-json-btn" class="download-btn download-btn-hidden hidden rounded-3xl bg-gradient-to-br from-primary to-primary-container text-white px-6 py-3 font-semibold shadow-lg transition">Download JSON</button>
        </div>
    </div>
</div>

<script src="demo.bundle.js"></script>
<script src="csvToJsonDemo.js"></script>
</body>
</html>
