    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c7c4d7;
            border-radius: 10px;
        }

        /* Toggle switch style for checkboxes */
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 44px;
            height: 24px;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 9999px;
            position: relative;
            display: inline-block;
            vertical-align: middle;
            margin: 0;
            cursor: pointer;
            border: 1px solid rgba(15, 23, 42, 0.06);
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        input[type="checkbox"]::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(2, 6, 23, 0.12);
            transition: transform 0.18s ease, background 0.18s ease;
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(90deg, #4338ca 0%, #6d28d9 100%);
            border-color: transparent;
        }

        input[type="checkbox"]:checked::after {
            transform: translateX(20px);
        }

        input[type="checkbox"]:focus {
            box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.12);
            outline: none;
        }

        .tab,
        .output-tab {
            padding: 0.9rem 1.25rem;
            border-radius: 9999px;
            transition: all 0.2s ease;
        }

        .tab.active,
        .output-tab.active {
            background: rgba(67, 56, 202, 0.12);
            color: #4338ca;
        }

        .tab:hover,
        .output-tab:hover {
            background: rgba(67, 56, 202, 0.08);
        }

        .btn-sample {
            background: rgba(67, 56, 202, 0.08);
            color: #4338ca;
            border: 1px solid rgba(67, 56, 202, 0.16);
            border-radius: 9999px;
            padding: 0.75rem 1rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-sample:hover {
            background: rgba(67, 56, 202, 0.14);
            transform: translateY(-1px);
        }

        .sample-btn {
            background: rgba(67, 56, 202, 0.1);
            color: #4338ca;
            border: 1.5px solid rgba(67, 56, 202, 0.3);
            border-radius: 9999px;
            padding: 0.625rem 1rem;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .sample-btn:hover {
            background: rgba(67, 56, 202, 0.18);
            border-color: rgba(67, 56, 202, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.15);
        }

        .sample-btn:active {
            transform: translateY(-1px);
            background: rgba(67, 56, 202, 0.24);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: transparent;
            color: #4338ca;
            border: none;
            padding: 0;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.18s ease;
        }

        .download-btn:hover {
            color: #2a14b4;
            text-decoration: none;
            background: transparent;
        }

        .download-btn:focus-visible {
            outline: 2px solid rgba(67, 56, 202, 0.35);
            outline-offset: 2px;
        }

        .download-btn .material-symbols-outlined {
            font-size: 1rem;
            line-height: 1;
        }

        .download-btn:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.9);
            outline-offset: 3px;
        }

        .file-btn {
            background: rgba(67, 56, 202, 0.06);
            color: #4338ca;
            border: 1px solid rgba(67, 56, 202, 0.12);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .file-btn:hover {
            background: rgba(67, 56, 202, 0.12);
            transform: translateY(-1px);
        }

        .file-drop-zone {
            border: 2px solid rgba(67, 56, 202, 0.2);
            background: rgba(67, 56, 202, 0.02);
            cursor: pointer;
        }

        .file-drop-zone:hover {
            border-color: rgba(67, 56, 202, 0.4);
            background: rgba(67, 56, 202, 0.06);
        }

        .file-drop-zone.drag-over {
            border-color: rgba(67, 56, 202, 0.8);
            background: rgba(67, 56, 202, 0.15);
            box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1);
        }

        #output-container {
            min-height: 170px;
        }

        body.file-tab-active #output-container {
            min-height: 597px;
        }

        .table-output {
            width: 100%;
            display: block;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 500px;
        }

        .table-output table {
            /* Allow table to size to content so headers fit on one line
               while still filling the container when content is small. */
            width: max-content;
            table-layout: auto;
            min-width: 100%;
        }

        .table-output th {
            background: rgba(241, 242, 254, 1);
            color: #4338ca;
            font-weight: 600;
            text-align: left;
            padding: 0.875rem 1rem;
            border-bottom: 2px solid rgba(67, 56, 202, 0.2);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table-output td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
            border-right: 1px solid rgba(15, 23, 42, 0.08);
            font-size: 0.8125rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table-output td:last-child {
            border-right: none;
        }

        .table-output tr:hover {
            background: rgba(67, 56, 202, 0.04);
        }

        .table-output tr:last-child td {
            border-bottom: none;
        }

        .json-output {
            position: relative;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            font-size: 0.875rem;
            background: linear-gradient(180deg, #0f1724 0%, #071028 100%);
            color: #e6eef8;
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(99, 102, 241, 0.12);
            box-shadow: 0 6px 18px rgba(3, 7, 18, 0.45);
            overflow-x: auto;
            overflow-y: auto;
            max-height: 500px;
            white-space: pre;
            line-height: 1.45;
        }

        .json-output::before {
            content: "JSON";
            position: absolute;
            bottom: 0.5rem;
            right: 0.75rem;
            background: rgba(255, 255, 255, 0.04);
            color: #c7d2fe;
            border: 1px solid rgba(199, 210, 254, 0.12);
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 20;
        }

        .copy-json-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.75rem;
            /* nudged right for visibility */
            z-index: 30;
            background: rgba(255, 255, 255, 0.06);
            color: #e6eef8;
            border: 1px solid rgba(199, 210, 254, 0.08);
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.08s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .copy-json-btn svg {
            width: 14px;
            height: 14px;
            display: inline-block;
            vertical-align: middle;
            color: #c7d2fe;
        }

        .copy-json-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.08);
        }

        .spinner-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: center;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid rgba(67, 56, 202, 0.18);
            border-top-color: #4338ca;
            border-radius: 9999px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .tab-content,
        .output-content {
            display: none;
        }

        .tab-content.active,
        .output-content.active {
            display: block;
        }

        .error-output {
            display: none;
        }

        .error-output:not(.hidden) {
            display: block;
        }

        .footer-basic {
            width: 100%;
            padding: 24px 0;
            color: #6b7280;
        }

        .footer-basic a {
            color: inherit;
            text-decoration: none;
            opacity: 0.8;
        }

        .footer-basic a:hover {
            opacity: 1;
        }

        .footer-basic .social>a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            color: inherit;
            opacity: 0.75;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

                                <button id="copy-json-btn" class="copy-json-btn" aria-label="Copy JSON">
                                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"

                                            stroke-linejoin="round" />
                                    </svg>
                                    Copy

    </main>
    <script src="demo.bundle.js"></script>
    <script src="csvToJsonDemo.js"></script>
    <script>
        document.addEventListener('click', function (e) {
            if (e.target && e.target.id === 'copy-json-btn') {
                const btn = e.target;
                const out = document.getElementById('json-output');
                if (!out) return;
                const text = out.textContent || out.innerText || '';
                if (!navigator.clipboard) {
                    // fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); } catch (err) { }
                    document.body.removeChild(ta);
                } else {
                    navigator.clipboard.writeText(text).catch(() => { });
                }
                const orig = btn.textContent;
                btn.textContent = 'Copied';
                btn.disabled = true;
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
            }
        });
    </script>
