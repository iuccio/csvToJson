        body {

        .container {
            max-width: 1200px;

        }

        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #dee2e6;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            color: #495057;
        }

        .tab:hover {
            background-color: #f8f9fa;
            color: #212529;
        }

        .tab.active {
            border-bottom-color: #007bff;
            color: #007bff;
            font-weight: 500;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.4;
            transition: border-color 0.3s;
        }

        textarea:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #007bff;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        .file-info {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #e9ecef;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        .samples {
            margin-top: 15px;
        }

        .sample-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-right: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .sample-btn:hover {
            background: #5a6268;
        }

        .options {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }

        .options h3 {
            margin-top: 0;
            color: #495057;
            font-size: 1.2em;
        }

        .option-group {
            display: inline-block;
            margin-right: 30px;
            margin-bottom: 15px;
        }

        .option-group label {
            display: inline;
            margin-right: 8px;
            font-weight: normal;
            cursor: pointer;
        }

        input[type="checkbox"],
        input[type="number"],
        input[type="text"] {
            margin-right: 5px;
        }

        .buttons {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin: 0 10px;
            transition: all 0.3s;
            box-shadow: 0 2px 4px rgba(0, 123, 255, 0.2);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }

        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .output {
            display: block;
        }

        .output.hidden {
            display: none;
        }

        .output-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #dee2e6;
        }

        .output-tab {
            padding: 10px 20px;

            border: none;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            color: #495057;
        }

        .output-tab:hover {
            background-color: #f8f9fa;
        }

        .output-tab.active {
            border-bottom-color: #28a745;
            color: #28a745;
            font-weight: 500;
        }

        .output-content {
            display: none;
        }

        .output-content.active {
            display: block;
        }

        .json-output,
        .table-output {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.4;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .table-output table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .table-output th,
        .table-output td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .table-output th {
            background-color: #e9ecef;
            font-weight: 600;
        }

        .stats-output {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .stats-output p {
            margin: 0;
            font-weight: 500;
        }

        .error-output {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #f5c6cb;
            margin-bottom: 20px;
        }

        .error-output:not(.hidden) {
            display: block;
        }

        .download-btn {
            margin-top: 1rem;
            background: #28a745;
            margin-left: 10px;
        }

        .download-btn:hover {
            background: #218838;
        }

        .hidden {
            display: none !important;
        }

        .github-link {
            color: unset;
            text-decoration: none;
        }

        .footer-basic {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            margin-top: 1rem;
            padding-top: 1rem;
            padding-bottom: 0.3rem;
            background-color: #ffffff;
            color: #4b4c4d;
        }

        .footer-basic ul {
            padding: 0;
            list-style: none;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .footer-basic li {
            padding: 0 10px;
        }

        .footer-basic ul a {
            color: inherit;
            text-decoration: none;
            opacity: 0.8;
        }

        .footer-basic ul a:hover {
            opacity: 1;
        }

        .footer-basic .social {
            text-align: center;
            padding-top: 1rem;
        }

        .footer-basic .social>a {
            font-size: 24px;
            width: 40px;
            height: 40px;
            line-height: 40px;
            display: inline-block;
            text-align: center;
            border-radius: 50%;
            border: 1px solid #ccc;
            margin: 0 8px;
            color: inherit;
            opacity: 0.75;
        }

        .footer-basic .social>a:hover {

        }

        .footer-basic .copyright {

            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 0;
        }

            .option-group {

                margin-right: 0;
            }

                flex-direction: column;
                gap: 10px;
            }

        .chunked-options {
            margin-left: 20px;

            border-left: 3px solid #007bff;

            width: 80px;
            display: inline-block;
        }

        .chunked-options small {
            color: #6c757d;
            font-size: 0.85em;
        }

        async function convert() {

            // Clear previous output
            clearOutput();

            convertBtn.disabled = true;

            try {
                let result;

                // Check which tab is active
                const activeTab = document.querySelector('.tab-content.active').id;
                const useStreaming = document.getElementById('use-streaming').checked;

                if (activeTab === 'text-tab') {
                    // Text input
                    const csvText = document.getElementById('csv-input').value;
                    if (!csvText.trim()) {
                        throw new Error('Please enter CSV text');
                    }
                    result = csvToJson.csvStringToJson(csvText);
                    displayResult(result);
                } else {
                    // File input
                    const fileInput = document.getElementById('csv-file');
                    if (!fileInput.files[0]) {
                        throw new Error('Please select a CSV file');
                    }

                    const useChunked = document.getElementById('use-chunked').checked;

                    if (useChunked) {
                        // Use chunked processing for large files
                        const chunkSize = parseInt(document.getElementById('chunk-size').value) || 1000;
                        await processFileInChunks(fileInput.files[0], chunkSize);
                    } else if (useStreaming) {
                        // Use streaming API
                        result = await csvToJson.getJsonFromFileStreamingAsync(fileInput.files[0]);

        async function processFileInChunks(file, chunkSize) {
            const output = document.getElementById('output');
            const jsonOutput = document.getElementById('json-output');
            const tableOutput = document.getElementById('table-output');
            const statsOutput = document.getElementById('stats-output');

            // Show results container
            output.classList.remove('hidden');
            clearOutput();

            // Initialize progress tracking
            let allRows = [];
            let totalProcessed = 0;

            // Create progress display
            const progressDiv = document.createElement('div');
            progressDiv.id = 'progress-display';
            progressDiv.innerHTML = '<h4>Processing large file...</h4><div id="progress-bar" style="width: 100%; background: #f0f0f0; height: 20px; border-radius: 10px; margin: 10px 0;"><div id="progress-fill" style="width: 0%; height: 100%; background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); border-radius: 10px; transition: width 0.3s;"></div></div><div id="progress-text">Initializing...</div>';
            output.insertBefore(progressDiv, output.firstChild);

            try {
                await csvToJson.getJsonFromFileStreamingAsyncWithCallback(file, {
                    chunkSize: chunkSize,
                    onChunk: (rows, processed, total) => {
                        console.log('onChunk called', rows.length, processed, total);
                        // Accumulate rows
                        allRows.push(...rows);
                        totalProcessed = processed;

                        // Update progress
                        const progressPercent = total ? Math.round((processed / total) * 100) : Math.min(Math.round((processed / 10000) * 100), 95);
                        document.getElementById('progress-fill').style.width = progressPercent + '%';
                        document.getElementById('progress-text').textContent = `Processed ${processed} rows...`;

                        // For very large files, show the first 1000 rows only
                        if (allRows.length <= 1000) {
                            displayTable(allRows);
                        } else if (allRows.length === 1001) {
                            displayTable(allRows);
                        }
                    },
                    onComplete: (allRowsComplete) => {
                        console.log('onComplete called', allRowsComplete.length);
                        allRows = allRowsComplete;

                        // Update progress to 100%
                        document.getElementById('progress-fill').style.width = '100%';
                        document.getElementById('progress-text').textContent = `Complete! Processed ${allRows.length} rows.`;

                        // Display final results
                        jsonOutput.textContent = JSON.stringify(allRows, null, 2);
                        displayStats(allRows);
                        displayTable(allRows);
                        showOutputTab('table');

                        // Remove progress after a delay
                        setTimeout(() => {
                            const progressDisplay = document.getElementById('progress-display');
                            if (progressDisplay) progressDisplay.remove();
                        }, 3000);
                    },
                    onError: (error) => {
                        console.error('Error:', error);
                        displayError(error);
                        const progressDisplay = document.getElementById('progress-display');
                        if (progressDisplay) progressDisplay.remove();
                    }
                });
            } catch (error) {
                console.error('Catch error:', error);
                displayError(error);
                const progressDisplay = document.getElementById('progress-display');
                if (progressDisplay) progressDisplay.remove();
            }
        }

        function displayResult(result) {

            const statsOutput = document.getElementById('stats-output');

            // Show results container
            output.classList.remove('hidden');

            // Display JSON

            // Display stats

        function displayTable(data) {
            const tableOutput = document.getElementById('table-output');
            if (!data || data.length === 0) {
                tableOutput.innerHTML = '<p>No data to display</p>';
                return;
            }

            const maxRows = 1000;
            const displayData = data.length > maxRows ? data.slice(0, maxRows) : data;
            let html = '<table>';
            
            // Header
            if (displayData.length > 0) {
                html += '<thead><tr>';
                Object.keys(displayData[0]).forEach(key => {
                    html += `<th>${key}</th>`;
                });
                html += '</tr></thead>';
            }

            // Body
            html += '<tbody>';
            displayData.forEach(row => {
                html += '<tr>';
                Object.values(row).forEach(value => {
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';

            if (data.length > maxRows) {
                html = `<p>Showing first ${maxRows} rows only. Full data is available in JSON view and row count is shown in stats.</p>${html}`;
            }

            tableOutput.innerHTML = html;
        }

        function displayStats(data) {
            const statsOutput = document.getElementById('stats-output');
            const rowCount = data ? data.length : 0;
            const colCount = data && data.length > 0 ? Object.keys(data[0]).length : 0;
            
            statsOutput.innerHTML = `
                <div><strong>Rows:</strong> ${rowCount}</div>
                <div><strong>Columns:</strong> ${colCount}</div>
            `;
        }

        function displayError(error) {
            const output = document.getElementById('output');
            const errorOutput = document.getElementById('error-output');

            // Show results container
            output.classList.remove('hidden');

            // Display error
            errorOutput.textContent = `Error: ${error.message}`;
            errorOutput.classList.remove('hidden');
        }

        function clearOutput() {
            const output = document.getElementById('output');
            const jsonOutput = document.getElementById('json-output');
            const tableOutput = document.getElementById('table-output');
            const statsOutput = document.getElementById('stats-output');
            const errorOutput = document.getElementById('error-output');

            jsonOutput.textContent = '';
            tableOutput.innerHTML = '';
            statsOutput.innerHTML = '';
            errorOutput.textContent = '';
            errorOutput.classList.add('hidden');
        }

        function clearAll() {
            clearOutput();
            document.getElementById('output').classList.add('hidden');
            document.getElementById('csv-input').value = '';
            document.getElementById('csv-file').value = '';
            document.getElementById('file-info').style.display = 'none';
        }

        function downloadJSON() {
            const jsonOutput = document.getElementById('json-output');
            const data = jsonOutput.textContent;
            if (!data) return;

            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
